<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Thryx">
<meta name="theme-color" content="#00C896">
<title>Thryx — Tu Entrenador Personal</title>
<!-- Google Fonts: preload + onload fallback -->
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@600;700;800;900&display=swap" as="style" onload="this.rel='stylesheet'">
<noscript>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@600;700;800;900&display=swap" rel="stylesheet">
</noscript>
<style>
/* Fuente del sistema como fallback si no hay Google Fonts */
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
@keyframes pulseGreen {
  0%,100% { opacity:1; transform:scale(1); }
  50%      { opacity:0.6; transform:scale(1.06); }
}
</style>
<script>
// ================================================================
// SERVICE WORKER — prefer registering /sw.js; fallback to blob to preserve behavior
// ================================================================
if ('serviceWorker' in navigator && window.isSecureContext) {
  // Intento preferente: registrar el sw.js en la raíz (mejor para depuración)
  navigator.serviceWorker.register('/sw.js').then(function(reg) {
    console.log('[Thryx] Service Worker registrado (/sw.js)');
  }).catch(function(err) {
    // Fallback conservador: registrar el SW desde un blob (comportamiento original)
    try {
      var swCode = `const CACHE_NAME = 'thryx-v1';\nconst CORE = ['./', './Thryx.html', './lib/tf.min.js', './movenet/model.json'];\nself.addEventListener('install', e => {\n  e.waitUntil(\n    caches.open(CACHE_NAME).then(c =>\n      Promise.allSettled(CORE.map(u => c.add(u).catch(() => {})))\n    )\n  );\n  self.skipWaiting();\n});\nself.addEventListener('activate', e => {\n  e.waitUntil(\n    caches.keys().then(ks =>\n      Promise.all(ks.filter(k => k !== CACHE_NAME).map(k => caches.delete(k)))\n    )\n  );\n  self.clients.claim();\n});\nself.addEventListener('fetch', e => {\n  const url = new URL(e.request.url);\n  if (['googleapis.com','gstatic.com','jsdelivr.net','tfhub.dev'].some(h => url.hostname.includes(h))) {\n    e.respondWith(fetch(e.request).catch(() => new Response('', {status: 503})));\n    return;\n  }\n  e.respondWith(\n    caches.match(e.request).then(cached => cached || fetch(e.request).then(r => {\n      if (r && r.status === 200) {\n        const clone = r.clone();\n        caches.open(CACHE_NAME).then(c => c.put(e.request, clone));\n      }\n      return r;\n    }))\n  );\n});`;
      var blob = new Blob([swCode], { type: 'application/javascript' });
      var swUrl = URL.createObjectURL(blob);
      navigator.serviceWorker.register(swUrl).then(function(reg) {
        console.log('[Thryx] Service Worker registrado (blob fallback)');
      }).catch(function(err2) {
        console.warn('[Thryx] registro SW fallo (blob)', err2);
      });
    } catch(e) {
      // fallback silencioso
    }
  });
}
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #00C896;
    --green-dark: #009E78;
    --green-light: #E0FAF3;
    --green-mid: #4DDDB4;
    --bg: #F4F6F9;
    --card: #FFFFFF;
    --card2: #F0F2F6;
    --text: #0D0D0D;
    --text-muted: #52576B;
    --text-hint: #9CA3AF;
    --border: rgba(0,0,0,0.07);
    --border-strong: rgba(0,0,0,0.13);
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 1px 4px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 8px rgba(0,0,0,0.04), 0 12px 32px rgba(0,0,0,0.1);
    --shadow-lg: 0 8px 16px rgba(0,0,0,0.04), 0 24px 48px rgba(0,0,0,0.14);
    --accent: #00C896;
    --accent2: #7C6FF7;
    --font-display: 'Plus Jakarta Sans', 'Inter', sans-serif;
  }

  html, body {
    background: var(--bg);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    text-rendering: optimizeLegibility;
  }

  /* ── SCREEN REDESIGNS ──────────────────────────────────── */

  /* Global section title style (used across all screens) */
  .section-title-pro {
    font-size: 22px;
    font-weight: 900;
    color: var(--text);
    font-family: var(--font-display);
    letter-spacing: -0.4px;
    margin-bottom: 4px;
  }
  .section-sub-pro {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.4;
  }

  /* INICIO screen - welcome card */
  .welcome-card-pro {
    background: linear-gradient(135deg, var(--green) 0%, var(--green-dark) 100%);
    border-radius: 20px;
    padding: 20px;
    color: white;
    margin: 0 0 16px;
    box-shadow: 0 6px 20px rgba(0,200,150,0.3);
  }
  .welcome-card-pro h2 {
    font-size: 22px;
    font-weight: 900;
    font-family: var(--font-display);
    margin-bottom: 4px;
  }
  .welcome-card-pro p {
    font-size: 13px;
    opacity: 0.85;
  }

  /* Stat cards row */
  .stat-cards-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .stat-card-pro {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px;
    box-shadow: var(--shadow);
  }
  .stat-card-pro .stat-val {
    font-size: 26px;
    font-weight: 900;
    color: var(--text);
    font-family: var(--font-display);
    letter-spacing: -0.5px;
    line-height: 1;
  }
  .stat-card-pro .stat-lbl {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 600;
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  /* Ejercicios - filter pills */
  .filter-pill {
    padding: 7px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--card);
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .filter-pill.active {
    background: var(--green);
    border-color: var(--green);
    color: white;
    box-shadow: 0 2px 8px rgba(0,200,150,0.3);
  }

  /* Exercise card - Hevy style */
  .ejerc-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 0;
    margin-bottom: 10px;
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .ejerc-card:active { transform: scale(0.99); box-shadow: none; }
  .ejerc-card-header {
    height: 4px;
    background: var(--green);
  }
  .ejerc-card-body {
    padding: 12px 14px;
  }

  /* ... (rest of CSS unchanged) ... */
</style>
</head>
<body>
<!-- El resto del contenido de index.html se mantiene sin cambios -->
</body>
</html>
